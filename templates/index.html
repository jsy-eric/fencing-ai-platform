<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FencingAI - 击剑AI智能体平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<!-- ============== TOP HEADER ============== -->
<header class="top-bar">
    <div class="top-bar__left">
        <button class="icon-btn" id="menu-toggle" aria-label="菜单">
            <i class="fas fa-bars"></i>
        </button>
        <a href="#" class="logo">
            <div class="logo__icon">
                <i class="fas fa-bolt"></i>
            </div>
            <span class="logo__text">FencingAI</span>
        </a>
    </div>

    <div class="top-bar__right">
        <span class="top-bar__status" id="ai-status-pill">
            <i class="fas fa-circle"></i> <span id="ai-status-text">检查中...</span>
        </span>

        <div class="lang-switcher" id="langSwitcher">
            <button class="lang-btn" id="langBtn" type="button" aria-label="切换语言">
                <i class="fas fa-globe"></i>
                <span id="langCurrent">中文</span>
                <i class="fas fa-chevron-down"></i>
            </button>
            <div class="lang-dropdown" id="langDropdown">
                <button class="lang-option active" data-lang="zh" type="button">
                    <span class="lang-flag">🇨🇳</span> 简体中文
                </button>
                <button class="lang-option" data-lang="en" type="button">
                    <span class="lang-flag">🇺🇸</span> English
                </button>
                <button class="lang-option" data-lang="ja" type="button">
                    <span class="lang-flag">🇯🇵</span> 日本語
                </button>
            </div>
        </div>
    </div>
</header>

<!-- ============== SIDEBAR ============== -->
<aside class="sidebar" id="sidebar">
    <nav class="sidebar__nav">
        <a href="#" class="sidebar__item sidebar__item--active" data-target="home">
            <i class="fas fa-house"></i><span data-i18n="nav.home">首页</span>
        </a>
        <hr class="sidebar__divider">

        <a href="#" class="sidebar__item" data-target="fie">
            <i class="fas fa-trophy"></i><span data-i18n="nav.fie">FIE 数据</span>
        </a>
        <a href="#" class="sidebar__item" data-target="chat">
            <i class="fas fa-microchip"></i><span data-i18n="nav.chat">AI 助手</span>
        </a>
    </nav>
</aside>

<!-- ============== MAIN CONTENT ============== -->
<main class="main" id="main">

    <div class="layout">
        <!-- Primary column (只保留视频和输入控制台) -->
        <div class="primary">

            <!-- Video player -->
            <section class="player">
                <div class="player__frame" id="video-player">
                    <div class="player__placeholder">
                        <div class="player__placeholder-icon">
                            <i class="fas fa-link"></i>
                        </div>
                        <h2 class="player__placeholder-title" data-i18n="hero.title">粘贴视频链接开始</h2>
                        <p class="player__placeholder-text" data-i18n="hero.sub">支持比赛回放、训练视频、技术教学等内容</p>
                    </div>
                </div>
                <div class="danmaku-layer" id="danmaku-display"></div>
            </section>

            <!-- Video input console -->
            <section class="console">
                <div class="console__row">
                    <div class="console__input-wrap">
                        <i class="fas fa-link console__input-icon"></i>
                        <input type="text" id="youtube-url" class="console__input"
                           placeholder="https://www.youtube.com/watch?v=..."
                           data-i18n-placeholder="placeholder.url">
                    <select id="weapon-select" class="console__select">
                        <option value="auto" data-i18n="weapon.auto">智能识别</option>
                        <option value="花剑" data-i18n="weapon.foil">花剑 · FOIL</option>
                        <option value="重剑" data-i18n="weapon.epee">重剑 · ÉPÉE</option>
                        <option value="佩剑" data-i18n="weapon.sabre">佩剑 · SABRE</option>
                    </select>
                    <button id="load-video" class="btn btn--primary">
                        <i class="fas fa-play"></i> <span data-i18n="btn.load">加载视频</span>
                    </button>
                </div>
            </section>

            <!-- Key moments timeline -->
            <section class="moments" id="moments" hidden>
                <div class="moments__head">
                    <h4><i class="fas fa-bullseye"></i> <span data-i18n="moments.title">关键时刻</span></h4>
                    <span class="moments__hint" id="moments-hint" data-i18n="moments.hint">点击节点跳转</span>
                </div>
                <div class="moments__list" id="moments-list"></div>
            </section>
        </div>

        <!-- Secondary column: 4 Tabs + 击剑知识 + 快速提问 -->
        <aside class="secondary">
            <!-- 4 Tab 切换器 -->
            <div class="tabs">
                <div class="tabs__list" role="tablist">
                    <button class="tab tab--active" data-tab="ai-assistant">
                        <i class="fas fa-robot"></i> <span data-i18n="tabs.aiAssistant">AI 助手</span>
                    </button>
                    <button class="tab" data-tab="action">
                        <i class="fas fa-wave-square"></i> <span data-i18n="tabs.action">动作分析</span>
                    </button>
                    <button class="tab" data-tab="knowledge">
                        <i class="fas fa-lightbulb"></i> <span data-i18n="tabs.knowledge">知识推荐</span>
                    </button>
                    <button class="tab" data-tab="fie">
                        <i class="fas fa-trophy"></i> <span data-i18n="tabs.fie">FIE 数据</span>
                    </button>
                </div>

                <!-- AI Assistant Panel (合并弹幕+聊天) -->
                <div class="panel" id="panel-ai-assistant">
                    <!-- Chat 区域 - 放在 Tab 区域顶部 -->
                    <div class="chat">
                        <div class="chat__header">
                            <span class="chat__title" data-i18n="chat.title">FencingAI 助手</span>
                            <div class="chat__actions">
                                <button id="advanced-analysis" class="icon-btn icon-btn--sm" title="深度分析" data-i18n-title="chat.advanced"><i class="fas fa-microscope"></i></button>
                                <button id="clear-chat" class="icon-btn icon-btn--sm" title="清空对话" data-i18n-title="chat.clear"><i class="fas fa-rotate-right"></i></button>
                            </div>
                        </div>
                        <div class="chat__messages" id="chat-messages">
                            <div class="msg msg--ai">
                                <div class="msg__avatar msg__avatar--ai"><i class="fas fa-microchip"></i></div>
                                <div class="msg__body">
                                    <div class="msg__author">FencingAI <span class="msg__time" data-i18n="chat.now">现在</span></div>
                                    <p data-i18n="chat.welcome">您好！我是击剑AI专家，可以为您解答击剑相关问题。请问有什么可以帮助您的吗？</p>
                                </div>
                            </div>
                        </div>

                        <!-- Input area with mode switcher -->
                        <div class="chat__input">
                            <input type="text" id="chat-input" class="input" placeholder="向 AI 提问..." data-i18n-placeholder="placeholder.chat">
                            <div class="mode-switcher" id="modeSwitcher">
                                <button class="mode-btn active" data-mode="hybrid" type="button" data-i18n-title="mode.hybrid" title="弹幕+对话">
                                    <i class="fas fa-comments"></i>
                                </button>
                                <button class="mode-btn" data-mode="chat" type="button" data-i18n-title="mode.chat" title="仅对话">
                                    <i class="fas fa-comment-dots"></i>
                                </button>
                            </div>
                            <button id="send-chat" class="icon-btn icon-btn--primary" title="发送" data-i18n-title="btn.send">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>

                    <!-- 配置项工具栏 - 放在 Tab 底部，合并所有配置到一行 -->
                    <div class="ai-toolbar" id="aiToolbar">
                        <button id="generate-ai-danmaku" class="toolbar-btn" data-i18n-title="btn.aiDanmaku" title="AI 生成弹幕">
                            <i class="fas fa-sparkles"></i>
                        </button>
                        <button id="auto-generate" class="toolbar-btn" data-i18n-title="btn.autoGen" title="自动生成">
                            <i class="fas fa-arrows-rotate"></i>
                        </button>
                        <label class="toolbar-btn toolbar-btn--switch" data-i18n-title="settings.showDanmaku" title="显示弹幕">
                            <i class="fas fa-eye"></i>
                            <input type="checkbox" id="show-danmaku" checked class="toolbar-switch">
                        </label>
                        <label class="toolbar-btn toolbar-btn--slider" data-i18n-title="settings.speed" title="弹幕速度">
                            <i class="fas fa-gauge"></i>
                            <input type="range" id="danmaku-speed" min="1" max="10" value="5" class="toolbar-slider">
                        </label>
                        <button id="refresh-insight" class="toolbar-btn" data-i18n-title="action.refresh" title="刷新">
                            <i class="fas fa-rotate"></i>
                        </button>
                    </div>
                </div>

                <!-- Action analysis panel -->
                <div class="panel" id="panel-action" hidden>
                    <div class="panel__header">
                        <h3 data-i18n="action.title">动作分析</h3>
                        <button id="refresh-insight" class="icon-btn icon-btn--sm" title="重新分析" data-i18n-title="action.refresh"><i class="fas fa-arrows-rotate"></i></button>
                    </div>
                    <div id="action-analysis-panel" class="panel__placeholder">
                        <i class="fas fa-wave-square"></i>
                        <p data-i18n="action.hint">点击刷新按钮即可进行动作分析</p>
                    </div>
                </div>

                <!-- Knowledge panel -->
                <div class="panel" id="panel-knowledge" hidden>
                    <div class="panel__header">
                        <h3 data-i18n="knowledge.title">推荐学习</h3>
                        <button id="refresh-knowledge" class="icon-btn icon-btn--sm" title="重新推荐" data-i18n-title="knowledge.refresh"><i class="fas fa-arrows-rotate"></i></button>
                    </div>
                    <div id="knowledge-recommendations" class="panel__placeholder">
                        <i class="fas fa-lightbulb"></i>
                        <p data-i18n="knowledge.hint">点击刷新按钮获取相关知识推荐</p>
                    </div>
                </div>

                <!-- FIE data panel -->
                <div class="panel" id="panel-fie" hidden>
                    <div class="panel__header">
                        <h3 data-i18n="fie.title">实时 FIE 数据</h3>
                        <button id="refresh-fie" class="icon-btn icon-btn--sm"><i class="fas fa-arrows-rotate"></i></button>
                    </div>
                    <div id="fie-data" class="panel__placeholder">
                        <i class="fas fa-trophy"></i>
                        <p data-i18n="common.loading">加载中...</p>
                    </div>
                </div>
            </div>

            <!-- 击剑知识区（固定在次列，Tab 之下） -->
            <div class="secondary__header">
                <h3 data-i18n="side.knowledge">击剑知识</h3>
                <span class="secondary__sub" id="rec-sub" data-i18n="side.recommend">根据剑种推荐</span>
            </div>

            <div class="rec-list" id="rec-list">
                <div class="rec rec--placeholder">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p data-i18n="common.loading">加载中...</p>
                </div>
            </div>

            <!-- 快速提问区（固定在次列底部） -->
            <div class="quick-help">
                <h4 data-i18n="side.quickHelp">快速提问</h4>
                <button class="quick-help__btn" data-q="花剑的有效部位是什么？" data-i18n="quick.foil">花剑的有效部位</button>
                <button class="quick-help__btn" data-q="重剑和花剑有什么区别？" data-i18n="quick.epee">重剑 vs 花剑</button>
                <button class="quick-help__btn" data-q="佩剑比赛能劈砍吗？" data-i18n="quick.sabre">佩剑规则</button>
                <button class="quick-help__btn" data-q="击剑比赛的计分规则？" data-i18n="quick.scoring">计分规则</button>
            </div>
        </aside>
    </div>
</main>

<!-- ============== SCRIPTS ============== -->
<script src="{{ url_for('static', filename='js/danmaku.js') }}"></script>
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
<script src="{{ url_for('static', filename='js/youtube.js') }}"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
