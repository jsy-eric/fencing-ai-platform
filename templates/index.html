<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ 击剑AI智能体平台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 头部导航 -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-sword"></i>
                <h1>击剑AI智能体平台</h1>
            </div>
            <div class="header-right">
                <nav class="nav">
                    <a href="#home" class="nav-link active" data-i18n="nav.home">首页</a>
                    <a href="#about" class="nav-link" data-i18n="nav.about">关于</a>
                    <a href="#contact" class="nav-link" data-i18n="nav.contact">联系</a>
                </nav>
                <div class="lang-toggle" title="切换中英文界面（保留占位，可接入原i18n逻辑）">
                    <button class="lang-btn lang-btn-zh active" data-lang="zh">中</button>
                    <button class="lang-btn lang-btn-en" data-lang="en">EN</button>
                </div>
            </div>
        </header>

        <!-- 主要内容区域 -->
        <main class="main-content">
            <!-- 左侧：视频播放区域 -->
            <div class="video-section">
                <div class="video-container">
                    <div class="video-input-section">
                        <h3><i class="fas fa-youtube"></i> <span data-i18n="video.title">YouTube视频播放</span></h3>
                        <div class="input-group">
                            <input type="text" id="youtube-url" placeholder="请输入YouTube视频链接..." class="url-input" data-i18n-placeholder="video.url.placeholder">
                            <select id="weapon-select" class="weapon-select" title="选择剑种可显著提升推送相关性">
                                <option value="auto" selected data-i18n="video.weapon.auto">剑种：自动</option>
                                <option value="花剑" data-i18n="video.weapon.foil">花剑</option>
                                <option value="重剑" data-i18n="video.weapon.epee">重剑</option>
                                <option value="佩剑" data-i18n="video.weapon.sabre">佩剑</option>
                            </select>
                            <button id="load-video" class="btn btn-primary">
                                <i class="fas fa-play"></i> <span data-i18n="video.load">加载视频</span>
                            </button>
                        </div>
                    </div>
                    
                    <div class="video-player" id="video-player">
                        <div class="video-placeholder">
                            <i class="fas fa-video fa-3x"></i>
                            <p data-i18n="video.url.placeholder">请输入YouTube视频链接...</p>
                        </div>
                    </div>
                    
                    <!-- 时间轴标注 -->
                    <div id="video-timeline" class="video-timeline"></div>
                    
                    <!-- 弹幕显示区域 -->
                    <div class="danmaku-display" id="danmaku-display">
                        <!-- 弹幕将在这里动态显示 -->
                    </div>
                </div>
            </div>

            <!-- 右侧：AI聊天和弹幕控制 -->
            <div class="sidebar">
                <!-- AI聊天区域 -->
                <div class="chat-section">
                    <h3><i class="fas fa-robot"></i> <span data-i18n="chat.title">AI击剑专家</span></h3>
                    <div class="chat-messages" id="chat-messages">
                        <div class="message ai-message">
                            <div class="message-avatar">
                                <i class="fas fa-robot"></i>
                            </div>
                            <div class="message-content">
                                <p data-i18n="chat.welcome">您好！我是击剑AI专家，可以为您解答击剑相关问题，分析比赛内容，并生成相关弹幕。请问有什么可以帮助您的吗？</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="chat-input">
                        <input type="text" id="chat-input" placeholder="输入您的问题..." class="chat-text-input" data-i18n-placeholder="chat.input.placeholder">
                        <button id="send-chat" class="btn btn-primary">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>

                <!-- 弹幕控制区域 -->
                <div class="danmaku-control">
                    <h3><i class="fas fa-comments"></i> <span data-i18n="danmaku.title">弹幕控制</span></h3>
                    
                    <div class="danmaku-input">
                        <input type="text" id="danmaku-input" placeholder="输入弹幕内容..." class="danmaku-text-input" data-i18n-placeholder="danmaku.input.placeholder">
                        <button id="send-danmaku" class="btn btn-secondary">
                            <i class="fas fa-paper-plane"></i> <span data-i18n="danmaku.send">发送</span>
                        </button>
                    </div>
                    
                    <div class="ai-danmaku-control">
                        <button id="generate-ai-danmaku" class="btn btn-success">
                            <i class="fas fa-magic"></i> <span data-i18n="danmaku.ai">AI生成弹幕</span>
                        </button>
                        <button id="auto-generate" class="btn btn-info">
                            <i class="fas fa-sync"></i> <span data-i18n="danmaku.auto">自动生成</span>
                        </button>
                    </div>
                    
                    <div class="danmaku-settings">
                        <label>
                            <input type="checkbox" id="show-danmaku" checked> <span data-i18n="danmaku.show">显示弹幕</span>
                        </label>
                        <label>
                            <input type="range" id="danmaku-speed" min="1" max="10" value="5"> <span data-i18n="danmaku.speed">弹幕速度</span>
                        </label>
                    </div>
                </div>

                <!-- 动作分析面板 -->
                <div class="action-analysis-section">
                    <h3><i class="fas fa-brain"></i> <span data-i18n="action.title">动作分析</span></h3>
                    <div id="action-analysis-panel" class="action-analysis-panel">
                        <p class="placeholder-text" data-i18n="action.placeholder">视频播放时将显示动作分析</p>
                    </div>
                </div>

                <!-- 知识推荐 -->
                <div class="knowledge-recommendations-section">
                    <h3>
                        <i class="fas fa-lightbulb"></i> <span data-i18n="rec.title">推荐学习</span>
                        <label class="auto-push-toggle" title="播放时自动推送知识卡片/消息">
                            <input type="checkbox" id="auto-push-knowledge" checked>
                            <span data-i18n="rec.autoPush">自动推送</span>
                        </label>
                    </h3>
                    <div id="knowledge-recommendations" class="knowledge-recommendations">
                        <p class="placeholder-text" data-i18n="rec.placeholder">正在分析视频内容...</p>
                    </div>
                </div>

                <!-- FIE数据区域 -->
                <div class="fie-data-section">
                    <h3><i class="fas fa-trophy"></i> <span data-i18n="fie.title">FIE比赛数据</span></h3>
                    <div class="fie-data" id="fie-data">
                        <div class="loading" data-i18n="fie.loading">加载中...</div>
                    </div>
                    <button id="refresh-fie" class="btn btn-outline">
                        <i class="fas fa-refresh"></i> <span data-i18n="fie.refresh">刷新数据</span>
                    </button>
                </div>
            </div>
        </main>

        <!-- 底部信息 -->
        <footer class="footer">
            <p data-i18n="footer">&copy; 2024 击剑AI智能体平台. 基于AI技术提供专业击剑知识和弹幕服务.</p>
        </footer>
    </div>

    <!-- 弹幕样式 -->
    <style id="danmaku-style"></style>

    <!-- JavaScript文件 -->
    <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/danmaku.js') }}"></script>
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
    <script src="{{ url_for('static', filename='js/youtube.js') }}"></script>
    <!-- 新增功能 -->
    <script src="{{ url_for('static', filename='js/knowledge_cards.js') }}"></script>
    <script src="{{ url_for('static', filename='js/timeline_annotator.js') }}"></script>
    <script src="{{ url_for('static', filename='js/interactive_qa.js') }}"></script>
    <script src="{{ url_for('static', filename='js/video_monitor.js') }}"></script>
</body>
</html>
